<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity — Mobile App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <!-- ====== Device Frame ====== -->
  <div class="device-frame">
    <!-- Notch Status Bar -->
    <div class="status-bar">
      <div class="notch"></div>
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c3.9 3.89 10.21 3.89 14.1 0l1.38-1.79c1.23-1.54 1.97-3.49 1.97-5.61 0-4.97-4.03-9-9-9z"/></svg>
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm0-18C6.48 3 2 7.48 2 13c0 2.38.84 4.57 2.24 6.28l1.43-1.43A7.94 7.94 0 0 1 4 13c0-4.41 3.59-8 8-8s8 3.59 8 8c0 1.76-.57 3.38-1.53 4.69l1.43 1.43A9.92 9.92 0 0 0 22 13c0-5.52-4.48-10-10-10z"/></svg>
        <svg class="w-5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="2" y="5" width="16" height="10" rx="2"/><line x1="20" y1="8" x2="20" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </div>

    <!-- Screen Content (Scrollable) -->
    <div class="screen-content px-5 pt-4">
      
      <!-- Title -->
      <div class="flex items-center justify-between mb-6 animate-in">
        <div>
          <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Historical Analytics</span>
          <h1 class="text-2xl font-extrabold text-gray-950 mt-0.5">Activity</h1>
        </div>
      </div>

      <!-- Segmented Control -->
      <div class="segmented-control mb-6 animate-in animate-in-delay-1">
        <button class="segment-btn active" data-value="week">Week</button>
        <button class="segment-btn" data-value="month">Month</button>
        <button class="segment-btn" data-value="year">Year</button>
      </div>

      <!-- Chart Simulation Card -->
      <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 mb-6 animate-in animate-in-delay-2">
        <div class="flex items-center justify-between mb-4">
          <div>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Spent This Week</span>
            <div class="text-xl font-extrabold text-gray-950 mt-0.5">$384.20</div>
          </div>
          <span class="badge text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">-12% vs last week</span>
        </div>

        <!-- Simulated Bar Chart -->
        <div class="flex items-end justify-between h-32 pt-4 gap-2">
          <!-- Mon -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 40px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Mon</span>
          </div>
          <!-- Tue -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 70px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Tue</span>
          </div>
          <!-- Wed -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-600 rounded-t-lg" style="height: 110px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Wed</span>
          </div>
          <!-- Thu -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 50px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Thu</span>
          </div>
          <!-- Fri -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 90px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Fri</span>
          </div>
          <!-- Sat -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 30px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Sat</span>
          </div>
          <!-- Sun -->
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="w-full bg-blue-100 rounded-t-lg" style="height: 15px;"></div>
            <span class="text-[9px] font-bold text-gray-400">Sun</span>
          </div>
        </div>
      </div>

      <!-- Skeleton Loading Section -->
      <div class="space-y-4 mb-6 animate-in animate-in-delay-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Loading detailed logs...</h3>

        <!-- Skeleton Item 1 -->
        <div class="flex items-center gap-3 p-1">
          <div class="w-10 h-10 skeleton-circle shrink-0"></div>
          <div class="flex-1 space-y-2">
            <div class="h-3 w-1/3 skeleton"></div>
            <div class="h-2.5 w-1/2 skeleton"></div>
          </div>
          <div class="w-12 h-3 skeleton shrink-0"></div>
        </div>

        <!-- Skeleton Item 2 -->
        <div class="flex items-center gap-3 p-1">
          <div class="w-10 h-10 skeleton-circle shrink-0"></div>
          <div class="flex-1 space-y-2">
            <div class="h-3 w-1/4 skeleton"></div>
            <div class="h-2.5 w-2/3 skeleton"></div>
          </div>
          <div class="w-12 h-3 skeleton shrink-0"></div>
        </div>

        <!-- Skeleton Item 3 -->
        <div class="flex items-center gap-3 p-1">
          <div class="w-10 h-10 skeleton-circle shrink-0"></div>
          <div class="flex-1 space-y-2">
            <div class="h-3 w-1/2 skeleton"></div>
            <div class="h-2.5 w-1/3 skeleton"></div>
          </div>
          <div class="w-12 h-3 skeleton shrink-0"></div>
        </div>
      </div>

    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <span>Home</span>
      </a>

      <a href="activity.html" class="nav-item active">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <span>Activity</span>
      </a>

      <a href="profile.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
        </div>
        <span>Profile</span>
      </a>
    </nav>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
