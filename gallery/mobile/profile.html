<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Mobile App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <!-- ====== Device Frame ====== -->
  <div class="device-frame">
    <!-- Notch Status Bar -->
    <div class="status-bar">
      <div class="notch"></div>
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c3.9 3.89 10.21 3.89 14.1 0l1.38-1.79c1.23-1.54 1.97-3.49 1.97-5.61 0-4.97-4.03-9-9-9z"/></svg>
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm0-18C6.48 3 2 7.48 2 13c0 2.38.84 4.57 2.24 6.28l1.43-1.43A7.94 7.94 0 0 1 4 13c0-4.41 3.59-8 8-8s8 3.59 8 8c0 1.76-.57 3.38-1.53 4.69l1.43 1.43A9.92 9.92 0 0 0 22 13c0-5.52-4.48-10-10-10z"/></svg>
        <svg class="w-5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="2" y="5" width="16" height="10" rx="2"/><line x1="20" y1="8" x2="20" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </div>

    <!-- Screen Content (Scrollable) -->
    <div class="screen-content px-5 pt-4">
      
      <!-- Title -->
      <div class="flex items-center justify-between mb-6 animate-in">
        <div>
          <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Account Settings</span>
          <h1 class="text-2xl font-extrabold text-gray-950 mt-0.5">Profile</h1>
        </div>
      </div>

      <!-- Centered Avatar and Name -->
      <div class="flex flex-col items-center text-center mt-4 mb-8 animate-in animate-in-delay-1">
        <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-600 to-indigo-600 text-white font-extrabold flex items-center justify-center text-3xl shadow-lg border-4 border-white">
          AM
        </div>
        <h2 class="text-lg font-extrabold text-gray-950 mt-4">Aris Mercer</h2>
        <p class="text-xs text-gray-400 font-medium">aris@antigravity.io</p>
      </div>

      <!-- Settings Cards Group -->
      <div class="bg-gray-50 border border-gray-100 rounded-[28px] p-5 space-y-1 mb-6 animate-in animate-in-delay-2">
        
        <!-- Row 1 -->
        <div class="settings-row" onclick="alert('Demo: Editing Personal Information')">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center">
              <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </div>
            <span class="text-xs font-semibold text-gray-800">Personal Info</span>
          </div>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </div>

        <hr class="border-gray-200/60" />

        <!-- Row 2 -->
        <div class="settings-row" onclick="alert('Demo: Editing Payment Methods')">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center">
              <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            </div>
            <span class="text-xs font-semibold text-gray-800">Payment Methods</span>
          </div>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </div>

        <hr class="border-gray-200/60" />

        <!-- Row 3 -->
        <div class="settings-row" onclick="alert('Demo: Editing Security Settings')">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-purple-50 text-purple-600 flex items-center justify-center">
              <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <span class="text-xs font-semibold text-gray-800">Security Settings</span>
          </div>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </div>

      </div>

      <!-- Sign Out Button -->
      <div class="animate-in animate-in-delay-3">
        <button class="w-full py-3.5 bg-red-50 hover:bg-red-100 text-red-650 text-xs font-bold rounded-2xl active:scale-98 transition text-center border border-red-100" onclick="openBottomSheet()">
          Sign Out
        </button>
      </div>

    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <span>Home</span>
      </a>

      <a href="activity.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <span>Activity</span>
      </a>

      <a href="profile.html" class="nav-item active">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
        </div>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Bottom Sheet Backdrop -->
    <div class="bottom-sheet-backdrop" id="bottomSheetBackdrop"></div>

    <!-- Sign Out Confirmation Bottom Sheet -->
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-handle"></div>
      <h3 class="text-sm font-bold text-gray-900 text-center mb-2">Confirm Sign Out</h3>
      <p class="text-[11px] text-gray-400 text-center mb-6">Are you sure you want to sign out of your Antigravity mobile wallet session?</p>
      
      <div class="flex flex-col gap-3">
        <button class="w-full py-3.5 bg-red-600 text-white text-xs font-semibold rounded-xl active:scale-95 transition" onclick="alert('Signed out successfully (Demo)'); closeBottomSheet();">Sign Out</button>
        <button class="w-full py-3.5 bg-gray-100 text-gray-500 text-xs font-semibold rounded-xl active:scale-95 transition" onclick="closeBottomSheet()">Cancel</button>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
