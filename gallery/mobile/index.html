<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet — Mobile App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <!-- ====== Device Frame ====== -->
  <div class="device-frame">
    <!-- Notch Status Bar -->
    <div class="status-bar">
      <div class="notch"></div>
      <span class="time">9:41</span>
      <div class="status-icons">
        <!-- Signal -->
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c3.9 3.89 10.21 3.89 14.1 0l1.38-1.79c1.23-1.54 1.97-3.49 1.97-5.61 0-4.97-4.03-9-9-9z"/></svg>
        <!-- Wifi -->
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm0-18C6.48 3 2 7.48 2 13c0 2.38.84 4.57 2.24 6.28l1.43-1.43A7.94 7.94 0 0 1 4 13c0-4.41 3.59-8 8-8s8 3.59 8 8c0 1.76-.57 3.38-1.53 4.69l1.43 1.43A9.92 9.92 0 0 0 22 13c0-5.52-4.48-10-10-10z"/></svg>
        <!-- Battery -->
        <svg class="w-5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="2" y="5" width="16" height="10" rx="2"/><line x1="20" y1="8" x2="20" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </div>

    <!-- Screen Content (Scrollable) -->
    <div class="screen-content px-5 pt-4">
      
      <!-- Title & Avatar -->
      <div class="flex items-center justify-between mb-6 animate-in">
        <div>
          <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Good morning</span>
          <h1 class="text-2xl font-extrabold text-gray-950 mt-0.5">Wallet</h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-blue-600 text-white font-bold flex items-center justify-center shadow">AM</div>
      </div>

      <!-- Balance Card -->
      <div class="balance-card mb-6 animate-in animate-in-delay-1">
        <span class="text-xs opacity-75 font-semibold">Total Balance</span>
        <div class="text-3xl font-black mt-1">$12,847.50</div>
        
        <div class="flex gap-3 mt-6">
          <button class="flex-1 py-3 bg-white/20 hover:bg-white/30 text-white text-xs font-semibold rounded-xl backdrop-blur transition active:scale-95" onclick="openBottomSheet()">
            Send Money
          </button>
          <button class="flex-1 py-3 bg-white text-blue-600 text-xs font-semibold rounded-xl shadow transition active:scale-95" onclick="alert('Receive: Your Wallet Address is: addr_0x4242')">
            Receive
          </button>
        </div>
      </div>

      <!-- Chips Filter -->
      <div class="chip-group flex gap-2 overflow-x-auto hide-scrollbar mb-6 animate-in animate-in-delay-2">
        <span class="chip chip-active" data-value="all">All</span>
        <span class="chip" data-value="sent">Sent</span>
        <span class="chip" data-value="received">Received</span>
        <span class="chip" data-value="pending">Pending</span>
      </div>

      <!-- Transactions Group: Today -->
      <div class="space-y-3 mb-6 animate-in animate-in-delay-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Today</h3>
        
        <!-- Transaction 1 -->
        <div class="transaction-item" onclick="alert('Transaction INV-8284details: Success, +$1,250.00')">
          <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 14l-7 7-7-7M12 21V3"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="text-xs font-bold text-gray-900 truncate">Vercel Payout</h4>
            <p class="text-[10px] text-gray-400">Received · 10:24 AM</p>
          </div>
          <span class="text-xs font-bold text-emerald-600">+$1,250.00</span>
        </div>

        <!-- Transaction 2 -->
        <div class="transaction-item" onclick="alert('Transaction INV-8283 details: Success, -$49.00')">
          <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 10l7-7 7 7M12 3v18"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="text-xs font-bold text-gray-900 truncate">Antigravity Pro subscription</h4>
            <p class="text-[10px] text-gray-400">Sent · 8:15 AM</p>
          </div>
          <span class="text-xs font-bold text-gray-900">-$49.00</span>
        </div>
      </div>

      <!-- Transactions Group: Yesterday -->
      <div class="space-y-3 mb-6 animate-in animate-in-delay-4">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Yesterday</h3>

        <!-- Transaction 3 -->
        <div class="transaction-item" onclick="alert('Transaction INV-8282 details: Success, +$320.00')">
          <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 14l-7 7-7-7M12 21V3"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="text-xs font-bold text-gray-900 truncate">Figma Referral Commission</h4>
            <p class="text-[10px] text-gray-400">Received · June 09</p>
          </div>
          <span class="text-xs font-bold text-emerald-600">+$320.00</span>
        </div>
      </div>

    </div>

    <!-- Floating Action Button -->
    <button class="fab" onclick="openBottomSheet()" aria-label="Quick Action">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <span>Home</span>
      </a>

      <a href="activity.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <span>Activity</span>
      </a>

      <a href="profile.html" class="nav-item">
        <div class="nav-pill"></div>
        <div class="nav-icon">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
        </div>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Bottom Sheet Backdrop -->
    <div class="bottom-sheet-backdrop" id="bottomSheetBackdrop"></div>

    <!-- Send Form Bottom Sheet -->
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-handle"></div>
      <h3 class="text-sm font-bold text-gray-900 text-center mb-6">Send Money</h3>
      
      <form onsubmit="event.preventDefault(); alert('Money sent successfully'); closeBottomSheet();">
        <div class="mb-4">
          <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Recipient Email</label>
          <input class="w-full bg-gray-50 border border-gray-100 p-3 rounded-xl text-xs outline-none focus:border-blue-600 focus:bg-white" type="email" placeholder="example@email.com" required />
        </div>

        <div class="mb-6">
          <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Amount</label>
          <input class="w-full bg-gray-50 border border-gray-100 p-3 rounded-xl text-xs outline-none focus:border-blue-600 focus:bg-white" type="number" step="0.01" min="0.01" placeholder="$0.00" required />
        </div>

        <div class="flex gap-3">
          <button class="flex-1 py-3 bg-blue-600 text-white text-xs font-semibold rounded-xl shadow active:scale-95 transition" type="submit">Confirm Send</button>
          <button class="flex-1 py-3 bg-gray-100 text-gray-500 text-xs font-semibold rounded-xl active:scale-95 transition" type="button" onclick="closeBottomSheet()">Cancel</button>
        </div>
      </form>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
